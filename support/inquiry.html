<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도입문의 | DUEGO SYSTEM</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,600;0,700;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

    <!-- CSS: 공통 → 서브 공통 순서 반드시 유지 -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sub.css">
</head>

<body class="is-sub-page support-page">

    <!-- Header Include -->
    <div id="header-wrap"></div>

    <!-- Sub Header: 브레드크럼 + 타이틀 + 탭 -->
    <header class="sub-header">
        <div class="sub-inner">

            <!-- 브레드크럼 + H1 -->
            <div class="sub-header-title">
                <div class="breadcrumbs">
                    <a href="/index.html"><i class="ri-home-5-line"></i></a>
                    <span class="sep">/</span>
                    <a href="#">고객지원</a>
                    <span class="sep">/</span>
                    <div class="breadcrumb-current">
                        <span>도입문의</span>
                    </div>
                </div>
                <h1>도입문의</h1>
            </div>

            <!-- 서브 탭 -->
            <nav class="sub-tabs">
                <div class="sub-tabs-links">
                    <a href="/support/inquiry.html" class="active">도입문의</a>
                    <a href="/support/notice.html">1:1 문의</a>
                </div>
            </nav>

        </div>
    </header>

    <!-- 컨텐츠 영역 -->
    <main class="sub-content-wrapper">
        <div class="sub-inner">

            <div class="inquiry-form-section">
                <!-- 폼 시작 -->
                <form action="#" method="POST" class="inquiry-form">
                    <div class="inquiry-grid">
                        
                        <!-- 1. 회사명 -->
                        <div class="form-group">
                            <label>회사 <span class="required">*</span></label>
                            <input type="text" placeholder="소속된 회사 또는 기관명을 입력해 주세요." required>
                        </div>

                        <!-- 2. 이름 -->
                        <div class="form-group">
                            <label>이름 <span class="required">*</span></label>
                            <input type="text" placeholder="담당자명을 입력해 주세요." required>
                        </div>

                        <!-- 3. 직급 -->
                        <div class="form-group">
                            <label>직급 <span class="required">*</span></label>
                            <input type="text" placeholder="직급을 입력해 주세요." required>
                        </div>

                        <!-- 4. 부서 -->
                        <div class="form-group">
                            <label>부서 <span class="required">*</span></label>
                            <input type="text" placeholder="소속된 부서를 입력해 주세요." required>
                        </div>

                        <!-- 5. 연락처 -->
                        <div class="form-group">
                            <label>연락처 <span class="required">*</span></label>
                            <input type="tel" placeholder="연락 가능한 전화번호를 입력해 주세요." required>
                        </div>

                        <!-- 6. 이메일 -->
                        <div class="form-group">
                            <label>이메일 <span class="required">*</span></label>
                            <input type="email" placeholder="이메일을 입력해 주세요." required>
                        </div>

                        <!-- 7. 웹사이트 -->
                        <div class="form-group">
                            <label>웹사이트</label>
                            <input type="url" placeholder="참고할 수 있는 웹사이트를 입력해 주세요.">
                        </div>

                        <!-- 8. 업종 -->
                        <div class="form-group">
                            <label>업종 <span class="required">*</span></label>
                            <select required>
                                <option value="" disabled selected>소속된 회사 또는 기관의 업종을 선택해 주세요.</option>
                                <option value="제조업">제조업</option>
                                <option value="건설업">건설업</option>
                                <option value="IT/서비스">IT/서비스</option>
                                <option value="공공기관">공공기관</option>
                                <option value="기타">기타</option>
                            </select>
                        </div>

                        <!-- 9. 직원 수 -->
                        <div class="form-group">
                            <label>직원 수</label>
                            <select>
                                <option value="" disabled selected>직원수를 선택해 주세요.</option>
                                <option value="50인 미만">50인 미만</option>
                                <option value="50인~100인">50인~100인</option>
                                <option value="100인~300인">100인~300인</option>
                                <option value="300인~500인">300인~500인</option>
                                <option value="500인 이상">500인 이상</option>
                            </select>
                        </div>

                        <!-- 10. 문의 제품/서비스 -->
                        <div class="form-group">
                            <label>문의 제품/서비스 <span class="required">*</span></label>
                            <select required>
                                <option value="" disabled selected>궁금하신 제품 또는 서비스를 선택해 주세요.</option>
                                <option value="DuegoSafer">되고세이퍼 (SaaS 플랫폼)</option>
                                <option value="DuegoSafer G">되고세이퍼 G (G-Cloud용)</option>
                                <option value="System Integration">구축형 시스템 개발</option>
                                <option value="Consulting">안전보건 컨설팅</option>
                            </select>
                        </div>

                        <!-- 11. 상담신청 문의 경로 -->
                        <div class="form-group">
                            <label>상담신청 문의 경로 <span class="required">*</span></label>
                            <select required>
                                <option value="" disabled selected>문의 경로를 선택해 주세요.</option>
                                <option value="검색엔진">검색엔진 (네이버, 구글 등)</option>
                                <option value="SNS">SNS (유튜브, 블로그 등)</option>
                                <option value="지인소개">지인 및 관계사 소개</option>
                                <option value="박람회">전시회 및 박람회</option>
                                <option value="기타">기타</option>
                            </select>
                        </div>

                        <!-- 12. 도입 시기 -->
                        <div class="form-group">
                            <label>도입 시기 <span class="required">*</span></label>
                            <select required>
                                <option value="" disabled selected>도입시기를 선택해 주세요.</option>
                                <option value="1개월 이내">1개월 이내</option>
                                <option value="3개월 이내">3개월 이내</option>
                                <option value="6개월 이내">6개월 이내</option>
                                <option value="1년 이내">1년 이내</option>
                            </select>
                        </div>

                        <!-- 13. 사업장 위치 -->
                        <div class="form-group">
                            <label>사업장(본사) 위치(시/도) <span class="required">*</span></label>
                            <input type="text" placeholder="사업장 소재지를 입력해 주세요." required>
                        </div>

                        <!-- 14. 사업장 상세주소 -->
                        <div class="form-group">
                            <label>사업장 상세주소</label>
                            <input type="text" placeholder="사업장의 상세주소를 입력해 주세요.">
                        </div>

                        <!-- 15. 문의 내용 -->
                        <div class="form-group full">
                            <label>문의 내용 <span class="required">*</span></label>
                            <textarea placeholder="문의 내용을 입력해 주세요." required></textarea>
                        </div>

                    </div>

                    <!-- 제출 버튼 -->
                    <div class="inquiry-submit-area">
                        <button type="submit" class="btn-submit">상담신청하기</button>
                    </div>
                </form>
            </div>

        </div>
    </main>

    <!-- Footer Include -->
    <div id="footer-wrap"></div>

    <!-- Back to Top -->
    <a href="#" class="back-to-top-sub"></a>

    <!-- JS: include → common 순서 반드시 유지 -->
    <script src="/js/include.js" defer></script>
    <script src="/js/common.js" defer></script>
</body>

</html>
