<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ✏️ 페이지마다 변경 -->
    <title>페이지 제목 | DUEGO SYSTEM</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,600;0,700;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

    <!-- CSS: 공통 → 서브 공통 순서 반드시 유지 -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sub.css">
</head>

<!-- ✏️ 페이지마다 body class 변경 (is-sub-page 는 고정) -->

<body class="is-sub-page [page-name]-page">

    <!-- Header Include -->
    <div id="header-wrap"></div>

    <!-- Sub Header: 브레드크럼 + 타이틀 + 탭 -->
    <header class="sub-header">
        <div class="sub-inner">

            <!-- 브레드크럼 + H1 -->
            <div class="sub-header-title">
                <div class="breadcrumbs">
                    <a href="/index.html"><i class="ri-home-5-line"></i></a>
                    <span class="sep">/</span>
                    <!-- ✏️ 상위 메뉴명 -->
                    <a href="#">상위메뉴</a>
                    <span class="sep">/</span>
                    <div class="breadcrumb-current">
                        <!-- ✏️ 현재 페이지명 -->
                        <span>현재 페이지</span>
                    </div>
                </div>
                <!-- ✏️ 페이지 H1 제목 -->
                <h1>페이지 제목</h1>
            </div>

            <!-- 서브 탭 -->
            <nav class="sub-tabs">
                <div class="sub-tabs-links">
                    <!-- ✏️ active 클래스 현재 페이지 탭에만 부여 -->
                    <a href="/about/vision.html">되고시스템 소개</a>
                    <a href="/about/ceo.html">CEO 인사말</a>
                    <a href="/about/business.html">사업분야 및 인증</a>
                    <a href="/about/history.html">주요 연혁</a>
                </div>
            </nav>

        </div>
    </header>

    <!-- 컨텐츠 영역: 여기서부터 페이지마다 다름 -->
    <main class="sub-content-wrapper">
        <div class="sub-inner">

            <!-- ✏️ 컨텐츠 여기에 작성 -->

        </div>
    </main>

    <!-- Footer Include -->
    <div id="footer-wrap"></div>

    <!-- Back to Top -->
    <a href="#" class="back-to-top-sub"></a>

    <!-- JS: include → common 순서 반드시 유지 -->
    <script src="/js/include.js" defer></script>
    <script src="/js/common.js" defer></script>
</body>

</html>
