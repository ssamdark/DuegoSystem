    <!-- JS: include → common 순서 반드시 유지 -->
    <script src="/js/include.js" defer></script>
    <script src="/js/common.js" defer></script>
    <script>
        document.querySelectorAll('.sm-menu-item--has-sub .sm-menu-item-head').forEach(head => {
            head.addEventListener('click', () => {
                const item = head.closest('.sm-menu-item');
                const isOpen = item.classList.contains('is-open');
                const btn = head.querySelector('.sm-menu-toggle');

                btn.classList.remove('spinning');
                void btn.offsetWidth;
                btn.classList.add('spinning');

                document.querySelectorAll('.sm-menu-item--has-sub.is-open').forEach(el => {
                    el.classList.remove('is-open');
                    el.querySelector('.sm-menu-toggle').setAttribute('aria-expanded', 'false');
                    el.querySelector('.sm-menu-sub-list').style.maxHeight = '0';
                });

                if (!isOpen) {
                    item.classList.add('is-open');
                    btn.setAttribute('aria-expanded', 'true');
                    const sub = item.querySelector('.sm-menu-sub-list');
                    sub.style.maxHeight = sub.scrollHeight + 'px';
                }
            });
        });

        // 기본 열림: 첫 번째 하위메뉴 항목
        const defaultItem = document.querySelector('.sm-menu-item--has-sub');
        if (defaultItem) {
            defaultItem.classList.add('is-open');
            defaultItem.querySelector('.sm-menu-toggle').setAttribute('aria-expanded', 'true');
            const sub = defaultItem.querySelector('.sm-menu-sub-list');
            sub.style.maxHeight = sub.scrollHeight + 'px';
        }
    </script>
